      .note { fill: #F5EEE9; }
      .line { stroke: #9C9A96; stroke-width: 1.35; marker-end: url(#arrow); }
      .dash { stroke: #9C9A96; stroke-width: 1.35; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .plain { stroke: #B5B2AD; stroke-width: 1.1; marker-end: url(#arrow); }
      .title { font: 700 15px Arial, Helvetica, sans-serif; fill: #347EA7; letter-spacing: 0; }
      .label { font: 600 14px Arial, Helvetica, sans-serif; fill: #242424; letter-spacing: 0; }
      .small { font: 500 12px Arial, Helvetica, sans-serif; fill: #343434; letter-spacing: 0; }
      .tiny { font: 500 11px Arial, Helvetica, sans-serif; fill: #545454; letter-spacing: 0; }
