  <text x="48" y="932" class="tiny">Current-source boundary: Gmail, Calendar, Linear, Slack, and Notion are active connectors. GitHub, Drive, and audio are extension paths, not active source boxes in this map.</text>
  <text x="48" y="956" class="tiny">Read-path boundary: answers, briefs, search, and relationships read stored context, graph rows, cache, and preference memory. Source APIs are not called during synthesis.</text>
  <text x="48" y="980" class="tiny">Relationship boundary: Gmail, Calendar, Linear, Notion, and meetings can shape the relationship graph. Slack remains searchable context, but casual chat is not turned into relationship edges.</text>
