<svg width="1900" height="1040" viewBox="0 0 1900 1040" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">zrux current architecture</title>
  <desc id="desc">A current architecture map showing product surfaces, source connections, active connectors, Trigger.dev ingestion, Supabase storage, read APIs, preference memory, OpenRouter synthesis, Langfuse, and Sentry.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L9 5L1 9V1Z" fill="#9C9A96"/>
    </marker>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#777777" flood-opacity="0.12"/>
    </filter>
    <style>
      .plane { fill: #CC7659; }
      .box { fill: #FBFAF7; stroke: #D8D5CF; stroke-width: 1.2; }
