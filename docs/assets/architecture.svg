<svg width="1800" height="720" viewBox="0 0 1800 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">zrux architecture and data flow</title>
  <desc id="desc">Data sources flow through Composio and Trigger.dev ingestion into Supabase Postgres and pgvector. The serving plane retrieves from storage, expands graph context, fetches personalization, generates through OpenRouter, and traces every call.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L9 5L1 9V1Z" fill="#A8A8A8"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#8C8C8C" flood-opacity="0.13"/>
    </filter>
    <style>
      .plane { fill: #CC7659; }
      .box { fill: #F8F7F4; stroke: #D8D6D1; stroke-width: 1.2; }
      .store { fill: #F8F7F4; stroke: #D8D6D1; stroke-width: 1.2; }
      .label { font: 600 15px Arial, Helvetica, sans-serif; fill: #242424; letter-spacing: 0; }
      .small { font: 500 13px Arial, Helvetica, sans-serif; fill: #343434; letter-spacing: 0; }
      .tiny { font: 500 12px Arial, Helvetica, sans-serif; fill: #545454; letter-spacing: 0; }
      .plane-title { font: 700 15px Arial, Helvetica, sans-serif; fill: #397FA8; letter-spacing: 0; }
      .note { fill: #F5EEE9; }
      .line { stroke: #A8A8A8; stroke-width: 1.35; marker-end: url(#arrow); }
      .dash { stroke: #A8A8A8; stroke-width: 1.35; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .thin { stroke: #B8B8B8; stroke-width: 1.1; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1800" height="720" fill="#FFFFFF"/>

  <rect x="40" y="50" width="1160" height="104" class="plane"/>
  <text x="600" y="73" text-anchor="middle" class="plane-title">Data Sources</text>

  <rect x="65" y="82" width="72" height="36" class="box"/>
  <text x="101" y="105" text-anchor="middle" class="small">Gmail</text>
  <rect x="205" y="82" width="90" height="36" class="box"/>
  <text x="250" y="105" text-anchor="middle" class="small">Calendar</text>
  <rect x="350" y="82" width="78" height="36" class="box"/>
  <text x="389" y="105" text-anchor="middle" class="small">Linear</text>
  <rect x="492" y="82" width="74" height="36" class="box"/>
  <text x="529" y="105" text-anchor="middle" class="small">Slack</text>
  <rect x="635" y="82" width="78" height="36" class="box"/>
  <text x="674" y="105" text-anchor="middle" class="small">Notion</text>
  <rect x="775" y="82" width="82" height="36" class="box"/>
  <text x="816" y="105" text-anchor="middle" class="small">GitHub</text>
  <rect x="920" y="82" width="80" height="36" class="box"/>
  <text x="960" y="105" text-anchor="middle" class="small">Sentry</text>
  <rect x="1036" y="82" width="140" height="36" class="box"/>
  <text x="1106" y="105" text-anchor="middle" class="small">Voice memos / audio</text>

  <rect x="466" y="232" width="96" height="45" class="box" filter="url(#softShadow)"/>
  <text x="514" y="260" text-anchor="middle" class="small">Composio</text>

  <rect x="1018" y="220" width="136" height="58" class="box" filter="url(#softShadow)"/>
  <text x="1086" y="243" text-anchor="middle" class="small">Deepgram STT</text>
  <text x="1086" y="260" text-anchor="middle" class="tiny">diarized transcript</text>

  <rect x="682" y="322" width="118" height="58" class="box" filter="url(#softShadow)"/>
  <text x="741" y="346" text-anchor="middle" class="small">Ingestion Jobs</text>
  <text x="741" y="363" text-anchor="middle" class="tiny">Trigger.dev</text>

  <rect x="625" y="462" width="710" height="116" class="plane"/>
  <text x="980" y="481" text-anchor="middle" class="plane-title">Supabase - Postgres + pgvector</text>

  <path d="M680 494C680 482 712 474 754 474C796 474 828 482 828 494V548C828 560 796 568 754 568C712 568 680 560 680 548V494Z" class="store" filter="url(#softShadow)"/>
  <path d="M680 494C680 506 712 514 754 514C796 514 828 506 828 494" stroke="#D8D6D1" stroke-width="1.2"/>
  <text x="754" y="514" text-anchor="middle" class="small">Layer 1: Context Engine</text>
  <text x="754" y="532" text-anchor="middle" class="tiny">context_item</text>
  <text x="754" y="548" text-anchor="middle" class="tiny">context_chunk</text>

  <path d="M1148 494C1148 482 1180 474 1222 474C1264 474 1296 482 1296 494V548C1296 560 1264 568 1222 568C1180 568 1148 560 1148 548V494Z" class="store" filter="url(#softShadow)"/>
  <path d="M1148 494C1148 506 1180 514 1222 514C1264 514 1296 506 1296 494" stroke="#D8D6D1" stroke-width="1.2"/>
  <text x="1222" y="514" text-anchor="middle" class="small">Layer 2: Relationship Graph</text>
  <text x="1222" y="532" text-anchor="middle" class="tiny">entity / edge</text>

  <rect x="1180" y="200" width="600" height="160" class="plane"/>
  <text x="1480" y="223" text-anchor="middle" class="plane-title">Serving Plane</text>
  <rect x="1210" y="242" width="130" height="40" class="box"/>
  <text x="1275" y="267" text-anchor="middle" class="small">Next.js Web Chat</text>
  <rect x="1634" y="242" width="112" height="40" class="box"/>
  <text x="1690" y="267" text-anchor="middle" class="small">Telegram Bot</text>
  <rect x="1354" y="318" width="150" height="58" class="box" filter="url(#softShadow)"/>
  <text x="1429" y="342" text-anchor="middle" class="small">Retrieval + Synthesis</text>
  <text x="1429" y="359" text-anchor="middle" class="tiny">Vercel AI SDK</text>

  <path d="M1360 494C1360 482 1392 474 1434 474C1476 474 1508 482 1508 494V548C1508 560 1476 568 1434 568C1392 568 1360 560 1360 548V494Z" class="store" filter="url(#softShadow)"/>
  <path d="M1360 494C1360 506 1392 514 1434 514C1476 514 1508 506 1508 494" stroke="#D8D6D1" stroke-width="1.2"/>
  <text x="1434" y="514" text-anchor="middle" class="small">Layer 3: Personalization</text>
  <text x="1434" y="532" text-anchor="middle" class="tiny">Supermemory</text>

  <rect x="1542" y="520" width="158" height="40" class="box"/>
  <text x="1621" y="545" text-anchor="middle" class="small">OpenRouter + fallback</text>
  <rect x="1720" y="520" width="70" height="40" class="box"/>
  <text x="1755" y="545" text-anchor="middle" class="small">Langfuse</text>

  <rect x="34" y="178" width="112" height="20" class="note"/>
  <text x="90" y="193" text-anchor="middle" class="tiny">managed OAuth + fetch</text>
  <rect x="178" y="178" width="112" height="20" class="note"/>
  <text x="234" y="193" text-anchor="middle" class="tiny">managed OAuth + fetch</text>
  <rect x="322" y="178" width="112" height="20" class="note"/>
  <text x="378" y="193" text-anchor="middle" class="tiny">managed OAuth + fetch</text>
  <rect x="466" y="178" width="112" height="20" class="note"/>
  <text x="522" y="193" text-anchor="middle" class="tiny">managed OAuth + fetch</text>
  <rect x="610" y="178" width="112" height="20" class="note"/>
  <text x="666" y="193" text-anchor="middle" class="tiny">managed OAuth + fetch</text>
  <rect x="754" y="178" width="112" height="20" class="note"/>
  <text x="810" y="193" text-anchor="middle" class="tiny">managed OAuth + fetch</text>
  <rect x="898" y="178" width="112" height="20" class="note"/>
  <text x="954" y="193" text-anchor="middle" class="tiny">managed OAuth + fetch</text>
  <rect x="1065" y="178" width="62" height="20" class="note"/>
  <text x="1096" y="193" text-anchor="middle" class="tiny">raw audio</text>

  <rect x="620" y="414" width="132" height="21" class="note"/>
  <text x="686" y="429" text-anchor="middle" class="tiny">normalize, enrich, embed</text>
  <rect x="1080" y="414" width="142" height="34" class="note"/>
  <text x="1151" y="428" text-anchor="middle" class="tiny">extract typed triples</text>
  <text x="1151" y="443" text-anchor="middle" class="tiny">+ speakers</text>
  <rect x="1244" y="414" width="96" height="21" class="note"/>
  <text x="1292" y="429" text-anchor="middle" class="tiny">graph expand</text>
  <rect x="1392" y="414" width="84" height="21" class="note"/>
  <text x="1434" y="429" text-anchor="middle" class="tiny">fetch profile</text>
  <rect x="1593" y="414" width="58" height="21" class="note"/>
  <text x="1622" y="429" text-anchor="middle" class="tiny">generate</text>
  <rect x="1706" y="414" width="98" height="21" class="note"/>
  <text x="1755" y="429" text-anchor="middle" class="tiny">trace every call</text>
  <rect x="1018" y="392" width="92" height="21" class="note"/>
  <text x="1064" y="407" text-anchor="middle" class="tiny">hybrid retrieve</text>

  <path d="M101 118C101 203 318 232 464 252" class="thin"/>
  <path d="M250 118C250 205 364 228 464 250" class="thin"/>
  <path d="M389 118C389 190 420 218 466 244" class="thin"/>
  <path d="M529 118V230" class="thin"/>
  <path d="M674 118C674 194 616 226 564 246" class="thin"/>
  <path d="M816 118C816 204 640 232 564 252" class="thin"/>
  <path d="M960 118C960 210 670 234 564 256" class="thin"/>
  <path d="M1106 118V218" class="thin"/>
  <path d="M1086 278C1086 326 940 330 801 346" class="thin"/>
  <path d="M562 255C580 294 640 314 682 338" class="line"/>
  <path d="M741 380C711 404 702 436 718 472" class="line"/>
  <path d="M800 356C982 374 1082 405 1196 472" class="line"/>
  <path d="M1354 348C1174 364 998 392 829 512" class="line"/>
  <path d="M1354 356C1300 370 1284 420 1248 474" class="line"/>
  <path d="M1429 376V472" class="line"/>
  <path d="M1504 356C1574 382 1618 434 1621 520" class="line"/>
  <path d="M1504 348C1630 362 1740 418 1755 520" class="dash"/>
  <path d="M1275 282C1275 314 1320 326 1354 334" class="line"/>
  <path d="M1690 282C1690 318 1570 330 1504 338" class="line"/>
  <path d="M1222 474C1184 418 1108 394 800 360" class="thin"/>

  <text x="40" y="664" class="tiny">Read path invariant: serving reads stored context from Postgres and profile memory only. It never calls Gmail, Linear, Slack, Notion, GitHub, Sentry, or Calendar at answer time.</text>
  <text x="40" y="690" class="tiny">Ingestion path invariant: durable jobs own source fetch, raw payload persistence, embeddings, graph extraction, and deletion detection.</text>
</svg>
